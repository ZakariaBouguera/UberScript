<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="text-center mb-5">Gestion de Menu Restaurant</h1>

    <!-- wallet de  l'utilisateur  -->
    <div class="alert alert-info text-center mb-4">
         Utilisateur : <strong id="user"></strong> &nbsp;|&nbsp;
         Portefeuille : <strong id="wallet"></strong>
        <span id="walletError" class="text-danger ms-3"></span>
    </div>

    <div class="row">
        <!-- Création de repas -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Créer un repas</h5>
                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input id="mealName" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Calories</label>
                        <input id="mealCalories" type="number" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Prix (€)</label>
                        <input id="mealPrice" type="number" class="form-control">
                    </div>
                    <button id="addMealBtn" class="btn btn-primary w-100">
                        Ajouter le repas
                    </button>
                </div>
            </div>
        </div>

        <!-- Liste des repas -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Liste des repas</h5>
                    <ul id="mealList" class="list-group">
                        <!-- rempli dynamiquement -->
                    </ul>
                </div>
            </div>
        </div>

        <!-- Menu  -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Menu</h5>
                    <ul id="menuList" class="list-group mb-3">
                        <!-- repas du menu -->
                    </ul>
                    <div class="d-grid gap-2">
                        <button id="calculateMenuBtn" class="btn btn-success">
                            Calculer le prix du menu
                        </button>
                        <!-- Bouton pour commander -->
                        <button id="orderMenuBtn" class="btn btn-warning">
                            Commander
                        </button>
                    </div>
                    <div class="mt-3">
                        <p>
                            <strong>Total HT :</strong> 
                            <span id="menuTotalHT">0</span> €
                        </p>
                        <p>
                            <strong>Total TTC :</strong> 
                            <span id="menuTotalTTC">0</span> €
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- historique des commande-->
    <div class="card shadow mt-4">
        <div class="card-body">
            <h5 class="card-title">Historique des commande</h5>
            <div id="orderHistory">
                <p class="text-muted">Aucune commande</p>
            </div>
        </div>
    </div>

</div>
<script type="module" src="dist/app.js"></script>
</body>
</html>
